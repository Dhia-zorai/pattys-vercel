        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        :root {
            --purple: #5B0D8A;
            --purple-dark: #420a65;
            --purple-mid: #7a1ab5;
            --mustard: #FBB82B;
            --mustard-dark: #d49520;
            --text-muted: #d4b8f0;
        }
        body { background: var(--purple-dark); font-family: 'FoodBuka', 'Cairo', sans-serif; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        body.rtl { direction: rtl; }
        .nav { background: var(--purple); border-bottom: 4px solid var(--mustard); padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
        .nav-logo { height: 70px; width: auto; object-fit: contain; }
        .header-actions { display: flex; align-items: center; gap: 1.25rem; }
        .nav-clock { font-size: 1.6rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }
        .lang-select { background: rgba(255,255,255,0.1); border: 1px solid rgba(248,184,49,0.5); color: white; padding: 0.4rem 0.8rem; border-radius: 8px; font-family: 'FoodBuka', 'Cairo', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; outline: none; }
        .lang-select option { background: var(--purple); color: #fff; }
        main { flex: 1; padding: 2rem 1rem 3rem; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--mustard); text-decoration: none; font-family: 'FoodBuka', 'Cairo', sans-serif; font-size: 1rem; font-weight: 700; border: 2px solid var(--mustard); border-radius: 10px; padding: 0.6rem 1.2rem; margin-bottom: 1.5rem; transition: background 0.15s, color 0.15s; }
        .back-link:hover { background: var(--mustard); color: var(--purple-dark); }
        .menu-title { font-family: 'FoodBuka', 'Cairo', sans-serif; font-size: 2.2rem; color: #fff; text-align: center; margin-bottom: 2rem; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; max-width: 960px; margin: 0 auto; }
        @media(min-width:480px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width:768px) { .menu-grid { grid-template-columns: repeat(3, 1fr); } }
        .menu-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.25); transition: transform 0.2s ease; cursor: pointer; }
        .menu-card:hover { transform: translateY(-4px); }
        .menu-card:active { transform: scale(1.05); }
        .menu-card.zoomed { transform: scale(1.15); box-shadow: 0 16px 40px rgba(0,0,0,0.4); z-index: 10; position: relative; }
        .menu-card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: linear-gradient(135deg, var(--purple) 0%, var(--mustard) 100%); }
        .menu-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .menu-card-title { font-family: 'FoodBuka', 'Cairo', sans-serif; font-size: 1.2rem; color: var(--purple-dark); text-align: center; padding: 1rem 0.5rem; }
        footer { text-align: center; padding: 1.5rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; border-top: 1px solid rgba(255,255,255,0.06); }
        .footer-logo { height: 40px; width: auto; opacity: 0.6; }
        .footer-copy { color: rgba(255,255,255,0.25); font-size: 0.75rem; font-family: 'FoodBuka', 'Cairo', sans-serif; letter-spacing: 0.05em; }
        @media(max-width:600px) {
            .nav { padding: 0.5rem 0.75rem; flex-wrap: wrap; }
            .nav-logo { height: 48px; width: 48px; }
            .header-actions { gap: 0.5rem; }
            .nav-clock { font-size: 1rem; }
            .lang-select { padding: 0.3rem 0.5rem; font-size: 0.8rem; }
            main { padding: 1rem 0.75rem 2rem; }
            .menu-title { font-size: 1.5rem; margin-bottom: 1rem; }
            .back-link { font-size: 0.85rem; padding: 0.5rem 0.9rem; margin-bottom: 1rem; }
            .menu-card-img { aspect-ratio: 16/9; }
            .menu-card-title { font-size: 1.1rem; padding: 0.75rem 0.5rem; }
            .menu-card.zoomed { transform: scale(1.05); }
            .footer-copy { font-size: 0.65rem; }
        }
    </style>
</head>

<script>
    function updateClock(){var n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
    setInterval(updateClock,1000);updateClock();

    var currentLang='en';
    var dict={
        en:{backLink:'\u2190 Back to Tracking',menuTitle:'Our Menu',burgers:'Burgers',sandwiches:'Sandwiches',wraps:'Wraps',sides:'Sides',drinks:'Drinks'},
        fr:{backLink:'\u2190 Retour au Suivi',menuTitle:'Notre Menu',burgers:'Burgers',sandwiches:'Sandwichs',wraps:'Wraps',sides:'Accompagnements',drinks:'Boissons'},
        ar:{backLink:'\u2190 العودة للتتبع',menuTitle:'قائمتنا',burgers:'برغر',sandwiches:'ساندويتشات',wraps:'رافات',sides:'أطباق جانبية',drinks:'مشروبات'}
    };
    function changeLanguage(lang){
        currentLang=lang;
        document.documentElement.lang=lang;
        document.body.classList.toggle('rtl',lang==='ar');
        var d=dict[lang];
        document.getElementById('backLink').innerHTML=d.backLink;
        document.getElementById('menuTitle').textContent=d.menuTitle;
        document.getElementById('catBurgers').textContent=d.burgers;
        document.getElementById('catSandwiches').textContent=d.sandwiches;
        document.getElementById('catWraps').textContent=d.wraps;
        document.getElementById('catSides').textContent=d.sides;
        document.getElementById('catDrinks').textContent=d.drinks;
    }

    document.querySelectorAll('.menu-card').forEach(function(card){
        card.addEventListener('click',function(e){
            e.stopPropagation();
            var wasZoomed=card.classList.contains('zoomed');
            document.querySelectorAll('.menu-card.zoomed').forEach(function(c){c.classList.remove('zoomed');});
            if(!wasZoomed) card.classList.add('zoomed');
        });
    });
    document.addEventListener('click',function(){
        document.querySelectorAll('.menu-card.zoomed').forEach(function(c){c.classList.remove('zoomed');});
    });
</script>
